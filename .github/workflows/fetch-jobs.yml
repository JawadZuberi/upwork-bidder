name: Fetch Upwork Jobs

on:
  schedule:
    # Runs every 30 minutes — free on GitHub Actions
    - cron: '*/30 * * * *'
  workflow_dispatch: # Also allows manual trigger from GitHub UI

jobs:
  fetch-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger job fetch
        run: |
          curl -s -X GET "${{ secrets.APP_URL }}/api/cron" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -w "\nStatus: %{http_code}" \
            --fail || echo "Fetch failed — check logs"
